[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:cacheprovider
    --junitxml=../../TestResults/automated-results.xml

markers =
    smoke: 冒烟测试 - 服务健康检查与连通性
    auth: 认证授权测试
    crud: CRUD 增删改查测试
    business: 业务逻辑与状态机测试
    tenant: 多租户隔离测试
    security: 安全测试 (注入/越权/XSS)
    boundary: 边界与异常值测试
    query: 查询组合与分页排序测试
    integration: 跨服务集成测试
    p0: P0 优先级 (阻断性)
    p1: P1 优先级 (核心功能)
    p2: P2 优先级 (次要功能)
    slow: 耗时较长的测试
    db_verify: 需要数据库连接的验证测试

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s

timeout = 60
timeout_method = thread
