[pytest]
asyncio_mode = auto
testpaths = api automated test-automation security blockchain
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    api: API 自动化测试
    account: Account 服务测试
    analytics: Analytics 服务测试
    blockchain: Blockchain 服务测试
    contentplatform: ContentPlatform 服务测试
    device: Device 服务测试
    gateway: Gateway 网关服务测试
    digitaltwin: DigitalTwin 服务测试
    energy: 能源域综合测试
    energycore_microgrid: EnergyCore MicroGrid 服务测试
    energycore_orchestrator: EnergyCore Orchestrator 服务测试
    energycore_pvessc: EnergyCore PVESSC 服务测试
    energycore_vpp: EnergyCore VPP 服务测试
    energyservices_carbontrade: EnergyServices CarbonTrade 服务测试
    energyservices_demandresp: EnergyServices DemandResp 服务测试
    energyservices_deviceops: EnergyServices DeviceOps 服务测试
    energyservices_electrade: EnergyServices ElecTrade 服务测试
    energyservices_energyeff: EnergyServices EnergyEff 服务测试
    energyservices_multienergy: EnergyServices MultiEnergy 服务测试
    energyservices_safecontrol: EnergyServices SafeControl 服务测试
    smoke: 冒烟测试
    p0: P0 优先级（认证/权限/租户）
    p1: P1 优先级（充电/结算/设备）
    p2: P2 优先级（分析/监控/区块链）
    p3: P3 优先级（内容/存储/AI）
    crud: CRUD 增删改查测试
    query: 查询条件组合测试
    security: 安全测试
    auth: 认证/授权测试
    boundary: 边界值测试
    charging: 充电服务测试
    chat: AI 对话测试
    identity: Identity 服务测试
    ingestion: Ingestion 服务测试
    insight: AI 洞察分析测试
    iotcloudai: IotCloudAI 服务测试
    observability: Observability 服务测试
    permission: Permission 服务测试
    tenant: 租户相关测试
    tenant_isolation: 多租户隔离测试
    ruleengine: RuleEngine 服务测试
    edge: 边缘模式测试
    db_verify: 数据库校验测试
    e2e: 前端 E2E 测试
    performance: 性能测试
    report: 报表相关测试
    integration: 跨服务集成测试
    business: 业务逻辑测试
    owasp: OWASP 安全规范测试
    matrix: 端点矩阵全量扫描
    database: 数据库集成测试
    container: Testcontainers 专用测试（需要 Docker）
    servicemesh: 服务网格与 Istio/Dapr 测试
    compliance: 安全合规测试
    settlement: Settlement 服务测试
    simulator: Simulator 服务测试
    station: Station 服务测试
    storage: Storage 服务测试
    workorder: WorkOrder 服务测试
    trading: EnergyServices.Trading 与电力/碳/需求响应测试
    # ===== 迭代标签（按 Sprint 追加，禁止删除历史标签）=====
    sprint1: Sprint-1 迭代用例（v1.0 正式上线基础版本）
    # sprint2: Sprint-2 迭代用例（v1.1 功能迭代，待启用）
    # sprint3: Sprint-3 迭代用例（v1.2，待启用）
    # ===== 状态标签（迭代生命周期管理）=====
    new_feature: 本迭代新增功能（Tier-1 必跑）
    bug_fix: 本迭代缺陷修复（Tier-2 必跑）
    changed: 本迭代改动（非新增非修复）
    deprecated: 已废弃功能，skip 执行，不计入有效用例数
    flaky: 已知不稳定用例，不阻断发布门禁，需单独跟踪
addopts =
    -v
    --tb=short
    --strict-markers
    --junitxml=../TestResults/pytest-results.xml
    # allure 已移除：收集脚本读取 junitxml，allure-results 会产生 180万+ 零碎文件，浪费磁盘
    # 如需临时启用：pytest --alluredir=allure-results
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
