# ═══════════════════════════════════════════════════════════════════
# 全量自动化测试工作流
# 推送到 main 分支自动触发，7 类工具并行全量执行
# 生成统一格式报告 → 提交到仓库 → 可被主仓库拉取
# 优化：各工具内部启用并行执行（pytest-xdist, Jest workers 等）
# ═══════════════════════════════════════════════════════════════════
name: "\U0001F680 全量测试"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_level:
        description: '测试级别'
        required: true
        default: 'full'
        type: choice
        options:
          - smoke
          - standard
          - full

concurrency:
  group: all-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── pytest（57,774 用例）- 内部并行 ───
  pytest:
    name: "\U0001F40D pytest"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'testing/tests/requirements.txt'
      - run: |
          pip install --upgrade pip
          pip install -r testing/tests/requirements.txt
      - name: 运行 pytest（并行）
        working-directory: testing/tests
        continue-on-error: true
        run: |
          mkdir -p ../../TestResults
          LEVEL="${{ github.event.inputs.test_level || 'full' }}"
          # -n auto 启用 pytest-xdist 并行执行
          ARGS="--tb=short --no-header -q --junitxml=../../TestResults/pytest-results.xml -n auto"
          if [ "$LEVEL" = "smoke" ]; then
            ARGS="$ARGS -m smoke --maxfail=10"
          elif [ "$LEVEL" = "standard" ]; then
            ARGS="$ARGS -m 'p0 or p1' --maxfail=50"
          fi
          echo "🚀 并行执行 | 级别: $LEVEL | 参数: pytest $ARGS"
          pytest $ARGS 2>&1 | tee ../../TestResults/pytest-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-pytest
          path: TestResults/
          retention-days: 7

  # ─── Cypress（9,877 用例）- 禁用视频加速 ───
  cypress:
    name: "\U0001F332 Cypress"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: testing/tests/cypress-tests
        run: npm ci || npm install
      - name: 运行 Cypress（优化）
        working-directory: testing/tests/cypress-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          # 禁用视频和截图以加速执行
          export CYPRESS_VIDEO=false
          export CYPRESS_SCREENSHOT_ON_RUN_FAILURE=false
          npx cypress run --reporter mochawesome 2>&1 | tee ../../../TestResults/cypress-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-cypress
          path: TestResults/
          retention-days: 7

  # ─── Playwright（11,093 用例）- 并行 Workers ───
  playwright:
    name: "\U0001F3AD Playwright"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: testing/tests/playwright-tests
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: 运行 Playwright（并行）
        working-directory: testing/tests/playwright-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          LEVEL="${{ github.event.inputs.test_level || 'full' }}"
          # --workers=4 启用多 Worker 并行
          # 同时输出 list（控制台可读） + junit（XML 可靠解析）
          ARGS="--reporter=list,junit --workers=4"
          if [ "$LEVEL" = "smoke" ]; then ARGS="$ARGS --grep @smoke"; fi
          echo "🚀 并行执行 | Workers: 4 | Reporter: list+junit"
          PLAYWRIGHT_JUNIT_OUTPUT_NAME=../../../TestResults/playwright-results.xml \
            npx playwright test $ARGS 2>&1 | tee ../../../TestResults/playwright-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-playwright
          path: TestResults/
          retention-days: 7

  # ─── Puppeteer（8,137 用例）- Jest maxWorkers ───
  puppeteer:
    name: "\U0001F916 Puppeteer"
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: testing/tests/puppeteer-tests
        run: npm ci || npm install
      - name: 运行 Puppeteer（并行）
        working-directory: testing/tests/puppeteer-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          # --maxWorkers=4 启用 Jest 并行执行
          echo "🚀 并行执行 | maxWorkers: 4"
          npx jest --ci --forceExit --maxWorkers=4 2>&1 | tee ../../../TestResults/puppeteer-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-puppeteer
          path: TestResults/
          retention-days: 7

  # ─── Selenium（6,540 用例）- pytest-xdist 并行 ───
  selenium:
    name: "\U0001F52C Selenium"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装 Chrome + ChromeDriver
        run: |
          # ubuntu-latest 已预装 Chrome，确认版本
          google-chrome --version || true
          # 安装 chromedriver 匹配版本
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+' | head -1)
          echo "Chrome: $CHROME_VERSION"
      - run: |
          pip install selenium pytest pytest-html webdriver-manager requests
          [ -f testing/tests/selenium-tests/requirements.txt ] && pip install -r testing/tests/selenium-tests/requirements.txt || true
      - name: 运行 Selenium（单进程避免端口冲突）
        working-directory: testing/tests/selenium-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          # 单进程执行，避免 mock_server 端口冲突和浏览器资源竞争
          echo "🚀 单进程执行 | pytest (headless Chrome)"
          pytest --tb=short -q --junitxml=../../../TestResults/selenium-results.xml 2>&1 | tee ../../../TestResults/selenium-output.txt || true
        env:
          HEADLESS: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-selenium
          path: TestResults/
          retention-days: 7

  # ─── k6（3,651 检查点，场景并行执行）───
  k6:
    name: "\u26A1 k6"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - name: 安装 k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: 启动 Mock 服务器
        run: |
          if [ -f testing/k6/mock-server.js ]; then
            node testing/k6/mock-server.js &
            MOCK_PID=$!
            echo "MOCK_PID=$MOCK_PID" >> $GITHUB_ENV
            sleep 2
            curl -sf http://localhost:8000/health || echo "Mock 服务器未就绪"
          fi
      - name: 运行 k6（全量 - 全部场景）
        continue-on-error: true
        run: |
          mkdir -p TestResults
          K6_DIR="testing/k6/scenarios"
          COMBINED_OUTPUT="TestResults/k6-output.txt"
          TOTAL_PASS=0
          TOTAL_FAIL=0
          SCENARIO_COUNT=0

          echo "═══════════════════════════════════════" > "$COMBINED_OUTPUT"
          echo "k6 全量测试 - 全部场景" >> "$COMBINED_OUTPUT"
          echo "═══════════════════════════════════════" >> "$COMBINED_OUTPUT"

          if [ -d "$K6_DIR" ]; then
            for SCENARIO in "$K6_DIR"/*.js; do
              [ -f "$SCENARIO" ] || continue
              SCENARIO_NAME=$(basename "$SCENARIO" .js)
              SCENARIO_COUNT=$((SCENARIO_COUNT + 1))
              echo "" >> "$COMBINED_OUTPUT"
              echo "──── 场景: $SCENARIO_NAME ────" >> "$COMBINED_OUTPUT"

              # CI 中限制每个场景最多 30s，避免 51 场景串行总超时
              k6 run --env BASE_URL=http://localhost:8000 \
                --duration 30s \
                --summary-export="TestResults/k6-${SCENARIO_NAME}-summary.json" \
                "$SCENARIO" 2>&1 | tee "TestResults/k6-${SCENARIO_NAME}-output.txt"
              # 同时追加到汇总输出
              cat "TestResults/k6-${SCENARIO_NAME}-output.txt" >> "$COMBINED_OUTPUT" || true

              # 从单场景输出提取 checks 统计（避免累计文件重复匹配）
              CHECKS_LINE=$(grep -E 'checks.+:' "TestResults/k6-${SCENARIO_NAME}-output.txt" | tail -1 || true)
              if [ -n "$CHECKS_LINE" ]; then
                P=$(echo "$CHECKS_LINE" | grep -oP '✓\s*\K\d+' || echo "0")
                F=$(echo "$CHECKS_LINE" | grep -oP '✗\s*\K\d+' || echo "0")
                [ -z "$P" ] && P=0
                [ -z "$F" ] && F=0
                TOTAL_PASS=$((TOTAL_PASS + P))
                TOTAL_FAIL=$((TOTAL_FAIL + F))
              fi
            done
          fi

          echo "" >> "$COMBINED_OUTPUT"
          echo "═══════════════════════════════════════" >> "$COMBINED_OUTPUT"
          echo "全量统计: $SCENARIO_COUNT 个场景, checks: ✓ $TOTAL_PASS  ✗ $TOTAL_FAIL" >> "$COMBINED_OUTPUT"

          # 合并所有 k6 summary JSON
          python3 -c "
          import json, glob, os
          summaries = glob.glob('TestResults/k6-*-summary.json')
          total_pass = 0
          total_fail = 0
          for f in summaries:
              try:
                  d = json.load(open(f))
                  checks = d.get('metrics', {}).get('checks', {}).get('values', {})
                  total_pass += int(checks.get('passes', 0))
                  total_fail += int(checks.get('fails', 0))
              except: pass
          combined = {'metrics': {'checks': {'values': {'passes': total_pass, 'fails': total_fail}}}}
          json.dump(combined, open('TestResults/k6-summary.json', 'w'), indent=2)
          print(f'Combined: {len(summaries)} summaries, passes={total_pass}, fails={total_fail}')
          " 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-k6
          path: TestResults/
          retention-days: 7

  # ─── C# 集成测试在本地执行，云端不跑（依赖业务项目源码编译）───
  # 详见 testing/JGSY.AGI.Test/ - 本地通过 dotnet test 运行
  # 报告通过 pull 脚本合并到 TestResults/reports/integration-report.json

  # ─── 汇总报告（等云端 6 类完成后生成）───
  summary:
    name: "\U0001F4CA 汇总报告"
    needs: [pytest, cypress, playwright, puppeteer, selenium, k6]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: "\U0001F4E5 下载所有测试结果"
        uses: actions/download-artifact@v4
        with:
          pattern: all-*
          path: TestResults/
          merge-multiple: true

      - name: "\U0001F4CA 生成 7 份标准格式报告"
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          LEVEL="${{ github.event.inputs.test_level || 'full' }}"

          # 为每个工具生成标准格式报告（与本地 generate-tool-reports.ps1 格式一致）
          ./.github/scripts/generate-ci-report.sh pytest \
            --xml TestResults/pytest-results.xml \
            --output TestResults/pytest-output.txt \
            --level "$LEVEL"

          ./.github/scripts/generate-ci-report.sh cypress \
            --output TestResults/cypress-output.txt \
            --level "$LEVEL"

          ./.github/scripts/generate-ci-report.sh playwright \
            --xml TestResults/playwright-results.xml \
            --output TestResults/playwright-output.txt \
            --level "$LEVEL"

          ./.github/scripts/generate-ci-report.sh puppeteer \
            --output TestResults/puppeteer-output.txt \
            --level "$LEVEL"

          ./.github/scripts/generate-ci-report.sh selenium \
            --xml TestResults/selenium-results.xml \
            --output TestResults/selenium-output.txt \
            --level "$LEVEL"

          ./.github/scripts/generate-ci-report.sh k6 \
            --output TestResults/k6-output.txt \
            --level "$LEVEL"

          # integration 在本地执行，云端不生成报告

      - name: "\U0001F4CA 生成汇总报告"
        run: |
          mkdir -p test-error-reports/latest/reports
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)

          # 复制标准报告到提交目录
          if [ -d "test-error-reports/latest/reports" ]; then
            cp TestResults/*-report.json test-error-reports/latest/reports/ 2>/dev/null || true
            cp TestResults/*-report.md test-error-reports/latest/reports/ 2>/dev/null || true
          fi

          # 生成汇总 summary.md
          cat > test-error-reports/latest/summary.md << 'HEADER'
          # 全量测试汇总报告
          HEADER

          echo "" >> test-error-reports/latest/summary.md
          echo "- **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test-error-reports/latest/summary.md
          echo "- **Git Commit**: ${{ github.sha }}" >> test-error-reports/latest/summary.md
          echo "- **测试级别**: ${{ github.event.inputs.test_level || 'full' }}" >> test-error-reports/latest/summary.md
          echo "- **触发方式**: ${{ github.event_name }}" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md

          echo "## 各工具执行状态" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md
          echo "| 工具 | 标准用例 | 状态 | 说明 |" >> test-error-reports/latest/summary.md
          echo "|------|----------|------|------|" >> test-error-reports/latest/summary.md

          # 检查各工具结果
          declare -A TOOL_CASES=(
            [pytest]=57774 [cypress]=9877 [playwright]=11093
            [puppeteer]=8137 [selenium]=6540 [k6]=3651
          )

          TOTAL_PASS=0
          TOTAL_FAIL=0

          for TOOL in pytest cypress playwright puppeteer selenium k6; do
            CASES="${TOOL_CASES[$TOOL]}"
            REPORT_JSON="test-error-reports/latest/reports/${TOOL}-report.json"
            if [ -f "$REPORT_JSON" ]; then
              T=$(python3 -c "import json; d=json.load(open('$REPORT_JSON')); print(d['summary']['total'])" 2>/dev/null || echo "0")
              P=$(python3 -c "import json; d=json.load(open('$REPORT_JSON')); print(d['summary']['passed'])" 2>/dev/null || echo "0")
              F=$(python3 -c "import json; d=json.load(open('$REPORT_JSON')); print(d['summary']['failed'])" 2>/dev/null || echo "0")
              TOTAL_PASS=$((TOTAL_PASS + P))
              TOTAL_FAIL=$((TOTAL_FAIL + F))
              if [ "$F" -gt 0 ]; then
                echo "| $TOOL | $CASES | ❌ | 执行 $T, 通过 $P, 失败 $F |" >> test-error-reports/latest/summary.md
              elif [ "$T" -gt 0 ]; then
                echo "| $TOOL | $CASES | ✅ | 执行 $T, 全部通过 |" >> test-error-reports/latest/summary.md
              else
                echo "| $TOOL | $CASES | ⚠️ | 未收集到结果 |" >> test-error-reports/latest/summary.md
              fi
            else
              echo "| $TOOL | $CASES | ⚠️ | 无报告文件 |" >> test-error-reports/latest/summary.md
            fi
          done

          GRAND_TOTAL=$((TOTAL_PASS + TOTAL_FAIL))
          echo "" >> test-error-reports/latest/summary.md
          echo "## 综合统计" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md
          echo "- **总执行**: $GRAND_TOTAL" >> test-error-reports/latest/summary.md
          echo "- **通过**: $TOTAL_PASS" >> test-error-reports/latest/summary.md
          echo "- **失败**: $TOTAL_FAIL" >> test-error-reports/latest/summary.md
          if [ "$GRAND_TOTAL" -gt 0 ]; then
            RATE=$(python3 -c "print(round($TOTAL_PASS / $GRAND_TOTAL * 100, 1))" 2>/dev/null || echo "0")
            echo "- **通过率**: ${RATE}%" >> test-error-reports/latest/summary.md
          fi

          # 各工具错误详情
          echo "" >> test-error-reports/latest/summary.md
          echo "## 失败详情" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md

          for TOOL in pytest cypress playwright puppeteer selenium k6; do
            OUTPUT="TestResults/${TOOL}-output.txt"
            if [ -f "$OUTPUT" ]; then
              FAIL_LINES=$(grep -E "FAILED|FAIL|✗|✘|Error|assert" "$OUTPUT" 2>/dev/null | head -20 || true)
              if [ -n "$FAIL_LINES" ]; then
                echo "### $TOOL" >> test-error-reports/latest/summary.md
                echo '```' >> test-error-reports/latest/summary.md
                echo "$FAIL_LINES" >> test-error-reports/latest/summary.md
                echo '```' >> test-error-reports/latest/summary.md
                echo "" >> test-error-reports/latest/summary.md

                # 生成独立错误报告
                cat > "test-error-reports/latest/${TOOL}-errors.md" << TOOLEOF
          # ${TOOL} 测试错误报告

          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}

          ## 失败详情

          TOOLEOF
                echo '```' >> "test-error-reports/latest/${TOOL}-errors.md"
                grep -E "FAILED|FAIL|✗|✘|Error|assert" "$OUTPUT" | head -50 >> "test-error-reports/latest/${TOOL}-errors.md" || true
                echo '```' >> "test-error-reports/latest/${TOOL}-errors.md"
              fi
            fi
          done

          # 归档到历史
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/* "test-error-reports/history/$TIMESTAMP/" 2>/dev/null || true
          cp -r test-error-reports/latest/reports "test-error-reports/history/$TIMESTAMP/" 2>/dev/null || true

          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 汇总报告已生成"
          echo "  通过: $TOTAL_PASS / 失败: $TOTAL_FAIL"
          cat test-error-reports/latest/summary.md

      - name: "\U0001F4E4 上传汇总报告"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-summary-report
          path: test-error-reports/
          retention-days: 30

      - name: "\U0001F4BE 提交报告到仓库"
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 全量测试报告 ${{ github.event.inputs.test_level || 'full' }} $(date +%Y-%m-%d_%H%M) [skip ci]"
          for i in 1 2 3; do
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push && break
            sleep $((i * 5))
          done
