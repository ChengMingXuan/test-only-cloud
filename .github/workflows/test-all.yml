# ═══════════════════════════════════════════════════════════════════
# 全量聚合测试工作流（手动触发）
# 6 类工具并行 → 生成独立报告 → 聚合总报告 → 提交到仓库
# ═══════════════════════════════════════════════════════════════════
name: 🚀 全量测试

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      test_level:
        description: '测试级别'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - standard
          - full

concurrency:
  group: all-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── pytest ───
  pytest:
    name: 🐍 pytest
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'testing/tests/requirements.txt'
      - run: pip install -r testing/tests/requirements.txt
      - name: 运行 pytest
        working-directory: testing/tests
        continue-on-error: true
        run: |
          mkdir -p ../../TestResults
          LEVEL="${{ github.event.inputs.test_level }}"
          ARGS="--tb=short -q --junitxml=../../TestResults/pytest-results.xml"
          if [ "$LEVEL" = "smoke" ]; then ARGS="$ARGS -m smoke --maxfail=10"; fi
          pytest $ARGS 2>&1 | tee ../../TestResults/pytest-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-pytest
          path: TestResults/
          retention-days: 7

  # ─── Cypress ───
  cypress:
    name: 🌲 Cypress
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: testing/tests/cypress-tests
        run: npm ci || npm install
      - name: 运行 Cypress
        working-directory: testing/tests/cypress-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          npx cypress run --reporter mochawesome 2>&1 | tee ../../../TestResults/cypress-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-cypress
          path: TestResults/
          retention-days: 7

  # ─── Playwright ───
  playwright:
    name: 🎭 Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: testing/tests/playwright-tests
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium
      - name: 运行 Playwright
        working-directory: testing/tests/playwright-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          LEVEL="${{ github.event.inputs.test_level }}"
          ARGS="--reporter=list"
          if [ "$LEVEL" = "smoke" ]; then ARGS="$ARGS --grep @smoke"; fi
          npx playwright test $ARGS 2>&1 | tee ../../../TestResults/playwright-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-playwright
          path: TestResults/
          retention-days: 7

  # ─── Puppeteer ───
  puppeteer:
    name: 🤖 Puppeteer
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - working-directory: testing/tests/puppeteer-tests
        run: npm ci || npm install
      - name: 运行 Puppeteer
        working-directory: testing/tests/puppeteer-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          npx jest --ci --forceExit 2>&1 | tee ../../../TestResults/puppeteer-output.txt || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-puppeteer
          path: TestResults/
          retention-days: 7

  # ─── Selenium ───
  selenium:
    name: 🔬 Selenium
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          pip install selenium pytest pytest-html webdriver-manager
          [ -f testing/tests/selenium-tests/requirements.txt ] && pip install -r testing/tests/selenium-tests/requirements.txt || true
      - name: 运行 Selenium
        working-directory: testing/tests/selenium-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults
          pytest --tb=short -q --junitxml=../../../TestResults/selenium-results.xml 2>&1 | tee ../../../TestResults/selenium-output.txt || true
        env:
          HEADLESS: "true"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-selenium
          path: TestResults/
          retention-days: 7

  # ─── k6 ───
  k6:
    name: ⚡ k6
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: 安装 k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: 运行 k6
        continue-on-error: true
        run: |
          mkdir -p TestResults
          if [ -f testing/k6/scenarios/smoke-test.js ]; then
            k6 run --env BASE_URL=http://localhost:8000 --summary-export=TestResults/k6-summary.json testing/k6/scenarios/smoke-test.js 2>&1 | tee TestResults/k6-output.txt || true
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-k6
          path: TestResults/
          retention-days: 7

  # ─── 汇总报告 ───
  summary:
    name: 📊 汇总报告
    needs: [pytest, cypress, playwright, puppeteer, selenium, k6]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: 📥 下载所有测试结果
        uses: actions/download-artifact@v4
        with:
          pattern: all-*
          path: TestResults/
          merge-multiple: true

      - name: 📊 生成标准格式报告
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          LEVEL="${{ github.event.inputs.test_level }}"
          
          # 为每个工具生成标准格式报告
          ./.github/scripts/generate-ci-report.sh pytest \
            --xml TestResults/pytest-results.xml \
            --output TestResults/pytest-output.txt \
            --level "$LEVEL"
          
          ./.github/scripts/generate-ci-report.sh cypress \
            --output TestResults/cypress-output.txt \
            --level "$LEVEL"
          
          ./.github/scripts/generate-ci-report.sh playwright \
            --xml TestResults/playwright-results.xml \
            --output TestResults/playwright-output.txt \
            --level "$LEVEL"
          
          ./.github/scripts/generate-ci-report.sh puppeteer \
            --xml TestResults/puppeteer-results.xml \
            --output TestResults/puppeteer-output.txt \
            --level "$LEVEL"
          
          ./.github/scripts/generate-ci-report.sh selenium \
            --xml TestResults/selenium-results.xml \
            --output TestResults/selenium-output.txt \
            --level "$LEVEL"
          
          ./.github/scripts/generate-ci-report.sh k6 \
            --output TestResults/k6-output.txt \
            --level "$LEVEL"

      - name: 📊 生成汇总报告
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          
          cat > test-error-reports/latest/summary.md << 'EOF'
          # 🚀 全量测试汇总报告
          
          EOF
          
          echo "- **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test-error-reports/latest/summary.md
          echo "- **Git Commit**: ${{ github.sha }}" >> test-error-reports/latest/summary.md
          echo "- **测试级别**: ${{ github.event.inputs.test_level }}" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md
          
          echo "## 各工具状态" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md
          echo "| 工具 | 状态 | 说明 |" >> test-error-reports/latest/summary.md
          echo "|------|------|------|" >> test-error-reports/latest/summary.md
          
          # 检查各工具结果
          for TOOL in pytest cypress playwright puppeteer selenium k6; do
            OUTPUT="TestResults/${TOOL}-output.txt"
            if [ -f "$OUTPUT" ]; then
              FAILS=$(grep -c "FAILED\|FAIL\|✗\|✘\|Error" "$OUTPUT" 2>/dev/null || echo "0")
              if [ "$FAILS" -gt 0 ]; then
                echo "| $TOOL | ❌ 有失败 | $FAILS 个失败/错误 |" >> test-error-reports/latest/summary.md
              else
                echo "| $TOOL | ✅ 通过 | - |" >> test-error-reports/latest/summary.md
              fi
            else
              echo "| $TOOL | ⚠️ 无输出 | 可能未执行或无输出文件 |" >> test-error-reports/latest/summary.md
            fi
          done
          
          echo "" >> test-error-reports/latest/summary.md
          echo "---" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md
          echo "## 各工具错误详情" >> test-error-reports/latest/summary.md
          echo "" >> test-error-reports/latest/summary.md
          
          for TOOL in pytest cypress playwright puppeteer selenium k6; do
            OUTPUT="TestResults/${TOOL}-output.txt"
            if [ -f "$OUTPUT" ]; then
              FAIL_LINES=$(grep -E "FAILED|FAIL|✗|✘|Error|assert" "$OUTPUT" 2>/dev/null | head -20)
              if [ -n "$FAIL_LINES" ]; then
                echo "### $TOOL" >> test-error-reports/latest/summary.md
                echo '```' >> test-error-reports/latest/summary.md
                echo "$FAIL_LINES" >> test-error-reports/latest/summary.md
                echo '```' >> test-error-reports/latest/summary.md
                echo "" >> test-error-reports/latest/summary.md
                
                # 同时生成独立错误报告
                cat > "test-error-reports/latest/${TOOL}-errors.md" << TOOLEOF
          # ${TOOL} 测试错误报告
          
          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}
          
          ## 失败详情
          
          TOOLEOF
                echo '```' >> "test-error-reports/latest/${TOOL}-errors.md"
                grep -E "FAILED|FAIL|✗|✘|Error|assert" "$OUTPUT" | head -50 >> "test-error-reports/latest/${TOOL}-errors.md" || true
                echo '```' >> "test-error-reports/latest/${TOOL}-errors.md"
              fi
            fi
          done
          
          # 归档
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/* "test-error-reports/history/$TIMESTAMP/" 2>/dev/null || true
          
          echo ""
          echo "═══════════════════════════════════════"
          echo "📊 汇总报告已生成"
          cat test-error-reports/latest/summary.md

      - name: 📤 上传汇总报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-summary-report
          path: test-error-reports/
          retention-days: 30

      - name: 💾 提交报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 全量测试报告 ${{ github.event.inputs.test_level }} $(date +%Y-%m-%d_%H%M)"
          git pull --rebase origin main || true
          git push || true
