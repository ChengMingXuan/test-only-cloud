# ═══════════════════════════════════════════════════════════════════
# Puppeteer 性能基准 + 视觉回归测试工作流
# 8,137 用例 | Node 22 + Jest | 支持 --maxWorkers 并行
# ═══════════════════════════════════════════════════════════════════
name: 🤖 Puppeteer

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  # push 触发已禁用，由 test-all.yml 统一调度
  # push:
  #   branches: [main]
  #   paths-ignore:
  #     - 'test-error-reports/**'
  workflow_dispatch:
    inputs:
      test_type:
        description: '测试类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - performance
          - visual
      max_workers:
        description: '并行 Worker 数量'
        required: false
        default: '4'
        type: choice
        options:
          - '1'
          - '2'
          - '4'
          - '50%'

concurrency:
  group: puppeteer-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-selection:
    name: 🧭 解析 Puppeteer 选择
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.selection.outputs.should_run }}
      selected_tools: ${{ steps.selection.outputs.selected_tools }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - id: selection
        shell: bash
        run: |
          python3 << 'PY'
          import json
          import os

          event_name = '${{ github.event_name }}'
          should_run = event_name == 'workflow_dispatch'
          selected = []

          if os.path.exists('.github/cloud-test-selection.json'):
              try:
                  manifest = json.load(open('.github/cloud-test-selection.json', encoding='utf-8'))
                  raw = manifest.get('selectedTools', [])
                  if isinstance(raw, str):
                      raw = [raw]
                  elif not isinstance(raw, list):
                      raw = []
                  selected = [item for item in raw if isinstance(item, str) and item]
              except Exception:
                  selected = []

          if event_name == 'push':
              should_run = selected == ['puppeteer']

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
              fh.write(f"selected_tools={','.join(selected)}\n")
          PY

  puppeteer-matrix:
    name: 🤖 Puppeteer [${{ matrix.shard }}/5]
    needs: detect-selection
    if: needs.detect-selection.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 安装依赖
        working-directory: testing/tests/puppeteer-tests
        run: npm ci || npm install

      - name: 🧪 运行 Puppeteer 分片 ${{ matrix.shard }}/5
        working-directory: testing/tests/puppeteer-tests
        continue-on-error: true
        run: |
          mkdir -p ../../../TestResults/puppeteer-shards
          WORKERS="${{ github.event.inputs.max_workers || '4' }}"
          SHARD=${{ matrix.shard }}

          echo "🚀 分片并发执行: shard ${SHARD}/5 | workers per shard: $WORKERS"
          npx jest \
            --config jest.config.js \
            --forceExit \
            --ci \
            --shard=${SHARD}/5 \
            --maxWorkers=$WORKERS \
            --reporters=default \
            --reporters=jest-junit \
            2>&1 | tee ../../../TestResults/puppeteer-shards/puppeteer-shard-${SHARD}-output.txt || true
        env:
          JEST_JUNIT_OUTPUT_DIR: ../../../TestResults/puppeteer-shards
          JEST_JUNIT_OUTPUT_NAME: puppeteer-shard-${{ matrix.shard }}-results.xml

      - name: 📤 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: puppeteer-shard-${{ matrix.shard }}
          path: TestResults/puppeteer-shards/
          retention-days: 30

  puppeteer-aggregate:
    name: 📊 Puppeteer 聚合
    needs: [detect-selection, puppeteer-matrix]
    if: always() && needs.detect-selection.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 下载分片结果
        uses: actions/download-artifact@v4
        with:
          pattern: puppeteer-shard-*
          path: TestResults/puppeteer-shards/
          merge-multiple: true

      - name: 📊 聚合分片结果
        run: |
          mkdir -p TestResults
          pip install junitparser

          python3 << 'EOF'
          import glob
          from junitparser import JUnitXml

          combined = JUnitXml()
          xml_files = glob.glob('TestResults/puppeteer-shards/**/puppeteer-shard-*-results.xml', recursive=True)

          for xml_file in sorted(xml_files):
              try:
                  xml = JUnitXml.fromfile(xml_file)
                  for suite in xml:
                      combined.add_testsuite(suite)
              except Exception as error:
                  print(f"警告: 无法解析 {xml_file}: {error}")

          combined.write('TestResults/puppeteer-results.xml')
          print(f"✅ 聚合完成: {len(xml_files)} 个分片")
          EOF

          cat TestResults/puppeteer-shards/**/puppeteer-shard-*-output.txt > TestResults/puppeteer-output.txt 2>/dev/null || true

      - name: 📊 生成错误报告
        if: always()
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)

          cat > test-error-reports/latest/puppeteer-errors.md << EOF
          # 🤖 Puppeteer 测试错误报告

          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}
          - **触发方式**: ${{ github.event_name }}

          ## 失败详情

          EOF

          if [ -f TestResults/puppeteer-output.txt ]; then
            echo '```' >> test-error-reports/latest/puppeteer-errors.md
            grep -E "FAIL|✕|Error|expect\(|Timeout" TestResults/puppeteer-output.txt | head -100 >> test-error-reports/latest/puppeteer-errors.md || true
            echo '```' >> test-error-reports/latest/puppeteer-errors.md
          fi

          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/puppeteer-errors.md "test-error-reports/history/$TIMESTAMP/" || true

      - name: 📤 上传聚合结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: puppeteer-results
          path: |
            TestResults/
            test-error-reports/
          retention-days: 30

      - name: 📊 生成标准格式报告
        if: always()
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          ./.github/scripts/generate-ci-report.sh puppeteer \
            --xml TestResults/puppeteer-results.xml \
            --output TestResults/puppeteer-output.txt \
            --level "smoke"

      - name: 💾 提交报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 Puppeteer 报告 $(date +%Y-%m-%d_%H%M) [skip ci]"
          for i in 1 2 3; do
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push && break
            sleep $((i * 5))
          done
