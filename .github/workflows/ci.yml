# ═══════════════════════════════════════════════════════════════════════════════
# JGSY.AGI CI/CD Pipeline (Unified)
# ═══════════════════════════════════════════════════════════════════════════════
# 触发: push/PR to main
# 阶段: build → audit-gates → publish → image → deploy
# 原则: 本地即生产，无 dev/staging/prod 环境区分
# ═══════════════════════════════════════════════════════════════════════════════

name: JGSY.AGI CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'testing/k6/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  DOTNET_VERSION: '8.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY || 'ghcr.io' }}
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

# ═══════════════════════════════════════════════════════════════════════════════
# Jobs
# ═══════════════════════════════════════════════════════════════════════════════
jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 1: Build + Unit Test
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 NuGet Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-

      - name: 📦 Restore
        run: dotnet restore AIOPS.sln

      - name: 🔨 Build
        run: dotnet build AIOPS.sln --no-restore --configuration Release -v q

      - name: 🧪 Test
        run: dotnet test testing/JGSY.AGI.Test/JGSY.AGI.Test.csproj --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
        continue-on-error: false

      - name: 📊 Generate Coverage Report
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool || true
          reportgenerator \
            -reports:"**/TestResults/**/coverage.cobertura.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;Cobertura;TextSummary;Badges" \
            -assemblyfilters:"+JGSY.AGI.*;-JGSY.AGI.Test*"
        if: always()

      - name: 📈 Check Coverage Threshold
        run: |
          SUMMARY=$(cat coverage-report/Summary.txt 2>/dev/null || echo "")
          if [ -n "$SUMMARY" ]; then
            LINE_COVERAGE=$(echo "$SUMMARY" | grep -oP 'Line coverage:\s*\K[0-9.]+' || echo "0")
            echo "📊 Line Coverage: ${LINE_COVERAGE}%"
            echo "## 📊 Test Coverage: ${LINE_COVERAGE}%" >> $GITHUB_STEP_SUMMARY
            # 覆盖率门限: 60% (逐步提升至 70%)
            THRESHOLD=60
            if [ $(echo "$LINE_COVERAGE < $THRESHOLD" | bc -l 2>/dev/null || echo 0) -eq 1 ]; then
              echo "::warning::代码覆盖率 ${LINE_COVERAGE}% 低于阈值 ${THRESHOLD}%"
            fi
          fi
        if: always()

      - name: 📊 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            **/TestResults/**
            coverage-report/**
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Audit Gates (阻断门 — 所有审计必须通过)
  # ─────────────────────────────────────────────────────────────────────────────
  audit-gates:
    name: 🔒 Audit Gates
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore (for vulnerability scan)
        run: dotnet restore AIOPS.sln

      # Gate 1: NuGet 漏洞扫描
      - name: 🔐 NuGet Vulnerability Audit
        shell: pwsh
        run: |
          $output = dotnet list AIOPS.sln package --vulnerable --include-transitive 2>&1
          $output | Out-File -FilePath vulnerability-report.txt -Encoding UTF8
          Write-Host $output
          if ($output -match "Critical") {
            Write-Host "::error::发现 Critical 级别漏洞，管线阻断"
            exit 1
          }

      # Gate 2: 权限码审计
      - name: 🔑 Permission Code Audit
        shell: pwsh
        run: ./scripts/audit-permission-codes.ps1 -FailOnMismatch

      # Gate 3: 裸露端点检测
      - name: 🛡️ Naked Endpoint Audit
        shell: pwsh
        run: ./scripts/audit-naked-endpoints.ps1 -FailOnNaked

      # Gate 4: AOT 兼容性 + JSON DTO 注册
      - name: ⚡ AOT Compatibility Gate
        shell: pwsh
        run: ./scripts/ci-aot-gate.ps1

      # Gate 5: API 契约兼容性
      - name: 📋 API Compatibility Check
        shell: pwsh
        run: |
          if (Test-Path ./scripts/check-api-compat.ps1) {
            ./scripts/check-api-compat.ps1 -FailOnBreaking
          } else {
            Write-Host "API compat check script not found, skipping"
          }

      # Gate 5.1: OpenAPI 变更通知（前端同步）
      - name: 📣 OpenAPI Change Notify
        if: github.event_name == 'pull_request'
        shell: pwsh
        run: |
          git fetch origin main --depth=1
          ./scripts/notify-openapi-change.ps1 -BaseRef origin/main -HeadRef HEAD -OutputFile openapi-change-summary.md

      - name: 📝 Publish OpenAPI Change Summary
        if: github.event_name == 'pull_request' && always()
        shell: pwsh
        run: |
          if (Test-Path openapi-change-summary.md) {
            Get-Content openapi-change-summary.md | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
          }

      # Gate 6: 敏感信息扫描
      - name: 🔍 Secret Scan
        shell: pwsh
        run: |
          if (Test-Path ./scripts/scan-secrets.ps1) {
            ./scripts/scan-secrets.ps1 -FailOnFound
          } else {
            Write-Host "Secret scan script not found, skipping"
          }

      - name: 📤 Upload Audit Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-reports
          path: |
            scripts/logs/*.log
            vulnerability-report.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 2: Publish (R2R for all services)
  # ─────────────────────────────────────────────────────────────────────────────
  publish:
    name: 📦 Publish
    needs: [build, audit-gates]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30

    strategy:
      matrix:
        service:
          # 平台服务
          - { name: Gateway,          project: JGSY.AGI.Gateway }
          - { name: Identity,         project: JGSY.AGI.Identity }
          - { name: Tenant,           project: JGSY.AGI.Tenant }
          - { name: Permission,       project: JGSY.AGI.Permission }
          - { name: Observability,    project: JGSY.AGI.Observability }
          - { name: Storage,          project: JGSY.AGI.Storage }
          # 业务服务
          - { name: Account,          project: JGSY.AGI.Account }
          - { name: Analytics,        project: JGSY.AGI.Analytics }
          - { name: Charging,         project: JGSY.AGI.Charging }
          - { name: Device,           project: JGSY.AGI.Device }
          - { name: DigitalTwin,      project: JGSY.AGI.DigitalTwin }
          - { name: Ingestion,        project: JGSY.AGI.Ingestion }
          - { name: Settlement,       project: JGSY.AGI.Settlement }
          - { name: Station,          project: JGSY.AGI.Station }
          - { name: WorkOrder,        project: JGSY.AGI.WorkOrder }
          - { name: ContentPlatform,  project: JGSY.AGI.ContentPlatform }
          # Web3
          - { name: IotCloudAI,       project: JGSY.AGI.IotCloudAI }
          - { name: Blockchain,       project: JGSY.AGI.Blockchain }

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 NuGet Cache
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ hashFiles('**/Directory.Packages.props', '**/*.csproj') }}
          restore-keys: nuget-

      - name: 📦 Publish ${{ matrix.service.name }}
        run: |
          dotnet publish ${{ matrix.service.project }}/${{ matrix.service.project }}.csproj \
            -c Release \
            -r linux-x64 \
            --self-contained false \
            -o Configuration2.0/docker/publish/${{ matrix.service.name }} \
            -v q

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: publish-${{ matrix.service.name }}
          path: Configuration2.0/docker/publish/${{ matrix.service.name }}
          retention-days: 3

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 3: Build Docker Images & Push
  # ─────────────────────────────────────────────────────────────────────────────
  image:
    name: 🐳 Docker Image
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📥 Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: publish-*
          path: Configuration2.0/docker/publish
          merge-multiple: false

      - name: 📂 Restructure Artifacts
        run: |
          # download-artifact 会创建 publish-ServiceName/files 结构
          # 需要重组为 Configuration2.0/docker/publish/ServiceName/files
          cd Configuration2.0/docker/publish
          for dir in publish-*; do
            service_name="${dir#publish-}"
            if [ -d "$dir" ]; then
              mv "$dir" "$service_name" 2>/dev/null || true
            fi
          done
          ls -la

      - name: 🔐 Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build & Push Images
        run: |
          TAG="${{ github.sha }}"
          SHORT_SHA="${TAG:0:7}"

          SERVICES=(
            Gateway Identity Tenant Permission Observability Storage
            Account Analytics Charging Device DigitalTwin Ingestion
            Settlement Station WorkOrder ContentPlatform
            EnergyCore EnergyServices IotCloudAI Blockchain
          )

          for SERVICE in "${SERVICES[@]}"; do
            LOWER_SERVICE=$(echo "$SERVICE" | tr '[:upper:]' '[:lower:]')
            IMAGE="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/jgsy-${LOWER_SERVICE}:${SHORT_SHA}"
            IMAGE_LATEST="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/jgsy-${LOWER_SERVICE}:latest"

            echo "🐳 Building ${SERVICE}..."
            docker build \
              -f Configuration2.0/docker/Dockerfile.runtime \
              --build-arg SERVICE_NAME=${SERVICE} \
              -t "${IMAGE}" \
              -t "${IMAGE_LATEST}" \
              Configuration2.0/docker/

            echo "📤 Pushing ${SERVICE}..."
            docker push "${IMAGE}"
            docker push "${IMAGE_LATEST}"
          done

      - name: 🛡️ Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/jgsy-gateway:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
        continue-on-error: true

      - name: 📤 Upload Trivy Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-scan
          path: trivy-results.sarif
          retention-days: 30

      - name: 📋 Generate SBOM
        run: |
          # CycloneDX SBOM for supply chain transparency
          dotnet tool install --global CycloneDX || true
          dotnet CycloneDX AIOPS.sln -o sbom/ -f json --exclude-test-projects || echo "SBOM generation skipped"

      - name: 📤 Upload SBOM
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom
          path: sbom/
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 4: Deploy (manual trigger via workflow_dispatch)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    needs: image
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 15

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/jgsy-agi
            git pull origin main
            
            # 使用镜像模式部署全部服务
            cd docker
            TAG="${{ github.sha }}"
            SHORT_SHA="${TAG:0:7}"
            
            export IMAGE_TAG="${SHORT_SHA}"
            docker compose \
              -f docker-compose.platform-standalone.yml \
              -f docker-compose.store.yml \
              -f docker-compose.store-web3.yml \
              up -d --pull always

            echo "✅ Deploy completed: ${SHORT_SHA}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Stage 5: Post-Deploy Smoke Test
  # ─────────────────────────────────────────────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⏳ Wait for Services
        run: sleep 30

      - name: 🏥 Health Check
        run: |
          GATEWAY="${{ secrets.DEPLOY_HOST }}:5000"
          SERVICES=("gateway" "tenant" "identity" "permission" "observability")
          
          FAILED=0
          for SVC in "${SERVICES[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://${GATEWAY}/health" --max-time 10 || echo "000")
            if [ "$STATUS" != "200" ]; then
              echo "::error::${SVC} health check failed (HTTP ${STATUS})"
              FAILED=1
            else
              echo "✅ ${SVC}: healthy"
            fi
          done
          
          if [ "$FAILED" -eq 1 ]; then
            echo "::error::部分服务健康检查失败，考虑回滚"
            exit 1
          fi

      - name: 🧪 k6 Smoke Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: testing/k6/smoke-test.js
          flags: --env BASE_URL=http://${{ secrets.DEPLOY_HOST }}:5000
        continue-on-error: true
