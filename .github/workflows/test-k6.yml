# ═══════════════════════════════════════════════════════════════════
# k6 性能压测工作流
# 3,651 检查点 | 仅 smoke 模式（CI安全）
# ═══════════════════════════════════════════════════════════════════
name: ⚡ k6

on:
  push:
    branches: [test-only-cloud]
    paths:
      - 'testing/k6/**'
      - '.github/workflows/test-k6.yml'
  workflow_dispatch:
    inputs:
      scenario:
        description: '测试场景'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - load
          - stress

concurrency:
  group: k6-${{ github.ref }}
  cancel-in-progress: true

jobs:
  k6:
    name: ⚡ k6 (${{ github.event.inputs.scenario || 'smoke' }})
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚡ 安装 k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
          k6 version

      - name: 🧪 运行 k6 测试
        id: test
        continue-on-error: true
        run: |
          SCENARIO="${{ github.event.inputs.scenario || 'smoke' }}"
          mkdir -p TestResults
          
          # 仅运行 smoke 模式（CI 安全，不施压外部服务）
          if [ -f "testing/k6/scenarios/${SCENARIO}-test.js" ]; then
            k6 run \
              --env BASE_URL=http://localhost:8000 \
              --out json=TestResults/k6-results.json \
              --summary-export=TestResults/k6-summary.json \
              "testing/k6/scenarios/${SCENARIO}-test.js" \
              2>&1 | tee TestResults/k6-output.txt || true
          else
            echo "场景文件不存在: testing/k6/scenarios/${SCENARIO}-test.js"
            # 列出可用场景
            ls -la testing/k6/scenarios/ || true
          fi

      - name: 📊 生成错误报告
        if: always()
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          
          cat > test-error-reports/latest/k6-errors.md << EOF
          # ⚡ k6 性能测试错误报告
          
          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}
          - **场景**: ${{ github.event.inputs.scenario || 'smoke' }}
          
          ## 测试结果
          
          EOF
          
          if [ -f TestResults/k6-output.txt ]; then
            echo '```' >> test-error-reports/latest/k6-errors.md
            tail -50 TestResults/k6-output.txt >> test-error-reports/latest/k6-errors.md || true
            echo '```' >> test-error-reports/latest/k6-errors.md
          fi
          
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/k6-errors.md "test-error-reports/history/$TIMESTAMP/" || true

      - name: 📤 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-results
          path: |
            TestResults/
            test-error-reports/
          retention-days: 30

      - name: 💾 提交错误报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 k6 错误报告 $(date +%Y-%m-%d_%H%M)"
          git push || true
