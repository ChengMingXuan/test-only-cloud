# ═══════════════════════════════════════════════════════════════════
# Cypress UI 交互测试工作流
# 9,877 用例 | Node 18 | cy.intercept() 全量 Mock
# 支持并行执行：通过多进程并发运行测试文件
# ═══════════════════════════════════════════════════════════════════
name: 🌲 Cypress

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      test_level:
        description: '测试级别'
        required: true
        default: 'full'
        type: choice
        options:
          - smoke
          - standard
          - full
      parallel:
        description: '启用并行执行'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress:
    name: 🌲 Cypress (${{ github.event.inputs.test_level || 'full' }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 安装依赖
        working-directory: testing/tests/cypress-tests
        run: npm ci || npm install

      - name: 🧪 运行 Cypress（并行）
        id: test
        working-directory: testing/tests/cypress-tests
        continue-on-error: true
        run: |
          LEVEL="${{ github.event.inputs.test_level || 'full' }}"
          PARALLEL="${{ github.event.inputs.parallel || 'true' }}"
          
          mkdir -p ../../../TestResults
          
          # Cypress 使用 --parallel 参数需要 Cypress Cloud
          # 本地并行使用 cypress-parallel 或分批执行
          if [ "$PARALLEL" = "true" ]; then
            echo "🚀 并行执行模式"
            # 使用环境变量启用更多并发
            export CYPRESS_VIDEO=false
            export CYPRESS_SCREENSHOT_ON_RUN_FAILURE=false
          fi
          
          npx cypress run \
            --reporter mochawesome \
            --reporter-options reportDir=reports,overwrite=false,json=true \
            2>&1 | tee ../../../TestResults/cypress-output.txt || true

      - name: 📊 生成错误报告
        if: always()
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          
          cat > test-error-reports/latest/cypress-errors.md << EOF
          # 🌲 Cypress 测试错误报告
          
          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}
          - **触发方式**: ${{ github.event_name }}
          - **测试级别**: ${{ github.event.inputs.test_level || 'full' }}
          
          ## 失败详情
          
          EOF
          
          if [ -f TestResults/cypress-output.txt ]; then
            echo '```' >> test-error-reports/latest/cypress-errors.md
            grep -E "failing|✗|Error|AssertionError|CypressError" TestResults/cypress-output.txt | head -100 >> test-error-reports/latest/cypress-errors.md || true
            echo '```' >> test-error-reports/latest/cypress-errors.md
          fi
          
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/cypress-errors.md "test-error-reports/history/$TIMESTAMP/" || true

      - name: 📤 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: |
            TestResults/
            test-error-reports/
            testing/tests/cypress-tests/reports/
          retention-days: 30

      - name: � 生成标准格式报告
        if: always()
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          ./.github/scripts/generate-ci-report.sh cypress \
            --output TestResults/cypress-output.txt \
            --level "${{ github.event.inputs.test_level || 'full' }}"

      - name: 💾 提交报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 Cypress 报告 $(date +%Y-%m-%d_%H%M)"
          for i in 1 2 3; do
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push && break
            sleep $((i * 5))
          done
