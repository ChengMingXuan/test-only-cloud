# ═══════════════════════════════════════════════════════════════════
# Cypress UI 交互测试工作流
# 9,877 用例 | Node 18 | cy.intercept() 全量 Mock
# 支持并行执行：通过多进程并发运行测试文件
# ═══════════════════════════════════════════════════════════════════
name: 🌲 Cypress

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      test_level:
        description: '测试级别'
        required: true
        default: 'full'
        type: choice
        options:
          - smoke
          - standard
          - full
      parallel:
        description: '启用并行执行'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: cypress-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress:
    name: 🌲 Cypress (${{ github.event.inputs.test_level || 'full' }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 安装依赖
        working-directory: testing/tests/cypress-tests
        run: npm ci || npm install

      - name: 🧪 运行 Cypress（10路并发）
        id: test
        working-directory: testing/tests/cypress-tests
        continue-on-error: true
        run: |
          rm -rf ../../../TestResults reports
          LEVEL="${{ github.event.inputs.test_level || 'full' }}"
          PARALLEL="${{ github.event.inputs.parallel || 'true' }}"
          CONCURRENCY=10
          
          mkdir -p ../../../TestResults
          export CYPRESS_VIDEO=false
          export CYPRESS_SCREENSHOT_ON_RUN_FAILURE=false
          
          # 收集全部 spec 文件
          SPECS=($(find e2e -name '*.cy.js' -o -name '*.cy.ts' | sort))
          TOTAL=${#SPECS[@]}
          echo "📋 共 $TOTAL 个 spec 文件，$CONCURRENCY 路并发"
          
          # 创建报告目录
          mkdir -p reports ../../../TestResults/cypress-shards
          
          # 分片并发函数
          run_shard() {
            local SHARD_ID=$1
            shift
            local FILES=("$@")
            local SPEC_LIST=$(IFS=,; echo "${FILES[*]}")
            local SHARD_MANIFEST="../../../TestResults/cypress-shards/shard-${SHARD_ID}-manifest.json"
            echo "🚀 [Shard $SHARD_ID] 启动 ${#FILES[@]} 个文件"
            python3 - "$SHARD_ID" "$SHARD_MANIFEST" "${FILES[@]}" <<'PY'
            import json
            import sys

            shard_id = int(sys.argv[1])
            manifest_path = sys.argv[2]
            specs = [item for item in sys.argv[3:] if item]

            with open(manifest_path, 'w', encoding='utf-8') as handle:
              json.dump({
                'shardId': shard_id,
                'specs': specs,
                'specCount': len(specs),
                'reportFile': f'shard-{shard_id}-mochawesome.json'
              }, handle, ensure_ascii=False, indent=2)
            PY
            npx cypress run \
              --spec "$SPEC_LIST" \
              --reporter mochawesome \
              --reporter-options "reportDir=reports/shard-${SHARD_ID},overwrite=false,json=true" \
              > "../../../TestResults/cypress-shards/shard-${SHARD_ID}.txt" 2>&1 || true
            python3 - "$SHARD_ID" <<'PY'
import glob
import json
import os
import sys

shard_id = int(sys.argv[1])
report_files = sorted(glob.glob(f'reports/shard-{shard_id}/*.json'))
aggregate = {
  'stats': {'tests': 0, 'passes': 0, 'failures': 0, 'pending': 0, 'duration': 0},
  'results': []
}

for report_file in report_files:
  with open(report_file, encoding='utf-8') as handle:
    data = json.load(handle)
  stats = data.get('stats', {})
  aggregate['stats']['tests'] += int(stats.get('tests', 0) or 0)
  aggregate['stats']['passes'] += int(stats.get('passes', 0) or 0)
  aggregate['stats']['failures'] += int(stats.get('failures', 0) or 0)
  aggregate['stats']['pending'] += int(stats.get('pending', 0) or 0)
  aggregate['stats']['duration'] += float(stats.get('duration', 0) or 0)
  aggregate['results'].extend(data.get('results', []) or [])

output_path = f'../../../TestResults/cypress-shards/shard-{shard_id}-mochawesome.json'
with open(output_path, 'w', encoding='utf-8') as handle:
  json.dump(aggregate, handle, ensure_ascii=False, indent=2)

print(f'merged {len(report_files)} mochawesome files -> {os.path.basename(output_path)}')
PY
            echo "✅ [Shard $SHARD_ID] 完成"
          }
          
          # 按 CONCURRENCY 分片
          SHARD=0
          declare -a SHARD_FILES
          for i in $(seq 0 $((CONCURRENCY - 1))); do
            SHARD_FILES[$i]=""
          done
          
          for i in "${!SPECS[@]}"; do
            SLOT=$((i % CONCURRENCY))
            if [ -n "${SHARD_FILES[$SLOT]}" ]; then
              SHARD_FILES[$SLOT]="${SHARD_FILES[$SLOT]} ${SPECS[$i]}"
            else
              SHARD_FILES[$SLOT]="${SPECS[$i]}"
            fi
          done
          
          # 启动全部并发进程
          PIDS=()
          for i in $(seq 0 $((CONCURRENCY - 1))); do
            if [ -n "${SHARD_FILES[$i]}" ]; then
              run_shard $i ${SHARD_FILES[$i]} &
              PIDS+=($!)
            fi
          done
          
          # 等待全部完成
          echo "⏳ 等待 ${#PIDS[@]} 路并发完成..."
          for PID in "${PIDS[@]}"; do
            wait $PID || true
          done
          
          # 汇总输出
          echo "📊 汇总各 shard 输出..."
          cat ../../../TestResults/cypress-shards/shard-*.txt > ../../../TestResults/cypress-output.txt 2>/dev/null || true

          python3 << 'EOF'
          import glob
          import json
          import os
          import sys

          files = glob.glob('../../../TestResults/cypress-shards/shard-*-mochawesome.json')
          aggregate = {
            'stats': {'tests': 0, 'passes': 0, 'failures': 0, 'pending': 0, 'duration': 0},
            'results': [],
            'executedFiles': [],
            'shards': [],
            'reportFiles': sorted(files),
          }

          for file in sorted(files):
            try:
              with open(file, encoding='utf-8') as handle:
                data = json.load(handle)
              manifest_path = file.replace('-mochawesome.json', '-manifest.json')
              manifest = {}
              if os.path.exists(manifest_path):
                try:
                  with open(manifest_path, encoding='utf-8') as manifest_handle:
                    manifest = json.load(manifest_handle)
                except Exception:
                  manifest = {}
              stats = data.get('stats', {})
              shard_specs = manifest.get('specs', []) if isinstance(manifest.get('specs', []), list) else []
              aggregate['shards'].append({
                'shardId': manifest.get('shardId'),
                'reportFile': os.path.basename(file),
                'specCount': len(shard_specs),
                'specs': shard_specs,
                'total': int(stats.get('tests', 0) or 0),
                'passed': int(stats.get('passes', 0) or 0),
                'failed': int(stats.get('failures', 0) or 0),
                'skipped': int(stats.get('pending', 0) or 0),
                'duration_s': round(float(stats.get('duration', 0) or 0) / 1000.0, 3),
              })
              aggregate['stats']['tests'] += int(stats.get('tests', 0) or 0)
              aggregate['stats']['passes'] += int(stats.get('passes', 0) or 0)
              aggregate['stats']['failures'] += int(stats.get('failures', 0) or 0)
              aggregate['stats']['pending'] += int(stats.get('pending', 0) or 0)
              aggregate['stats']['duration'] += float(stats.get('duration', 0) or 0)
              for result in data.get('results', []) or []:
                aggregate['results'].append(result)
                file_name = result.get('file') or result.get('fullFile') or result.get('spec')
                if isinstance(file_name, str) and file_name:
                  aggregate['executedFiles'].append(file_name)
              if not shard_specs:
                aggregate['executedFiles'].append(os.path.basename(file))
            except Exception as exc:
              print(f'warning: failed to parse {file}: {exc}')

          aggregate['executedFiles'] = sorted(set(aggregate['executedFiles']))
          aggregate['shardCount'] = len(aggregate['shards'])

          with open('../../../TestResults/cypress-results.json', 'w', encoding='utf-8') as handle:
            json.dump(aggregate, handle, ensure_ascii=False, indent=2)

          if not files:
            print('error: no mochawesome shard reports were produced', file=sys.stderr)
            sys.exit(2)

          if int(aggregate['stats']['tests']) <= 0:
            print('error: mochawesome reports were produced but total tests is 0', file=sys.stderr)
            sys.exit(3)
          EOF
          
          # 统计结果
          PASS=$(grep -c "passing" ../../../TestResults/cypress-output.txt 2>/dev/null || echo "0")
          FAIL=$(grep -c "failing" ../../../TestResults/cypress-output.txt 2>/dev/null || echo "0")
          echo "🏁 全部完成 | passing 行: $PASS | failing 行: $FAIL"

      - name: 📊 生成错误报告
        if: always()
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          
          cat > test-error-reports/latest/cypress-errors.md << EOF
          # 🌲 Cypress 测试错误报告
          
          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}
          - **触发方式**: ${{ github.event_name }}
          - **测试级别**: ${{ github.event.inputs.test_level || 'full' }}
          
          ## 失败详情
          
          EOF
          
          if [ -f TestResults/cypress-output.txt ]; then
            echo '```' >> test-error-reports/latest/cypress-errors.md
            grep -E "failing|✗|Error|AssertionError|CypressError" TestResults/cypress-output.txt | head -100 >> test-error-reports/latest/cypress-errors.md || true
            echo '```' >> test-error-reports/latest/cypress-errors.md
          fi
          
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/cypress-errors.md "test-error-reports/history/$TIMESTAMP/" || true

      - name: 📤 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-results
          path: |
            TestResults/
            test-error-reports/
            testing/tests/cypress-tests/reports/
          retention-days: 30

      - name: 📊 生成标准格式报告
        if: always()
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          ./.github/scripts/generate-ci-report.sh cypress \
            --json TestResults/cypress-results.json \
            --output TestResults/cypress-output.txt \
            --level "${{ github.event.inputs.test_level || 'full' }}"

          mkdir -p test-error-reports/latest/reports
          cp TestResults/*-report.json test-error-reports/latest/reports/ 2>/dev/null || true
          cp TestResults/*-report.md test-error-reports/latest/reports/ 2>/dev/null || true
          cp TestResults/reports/*-report.json test-error-reports/latest/reports/ 2>/dev/null || true
          cp TestResults/reports/*-report.md test-error-reports/latest/reports/ 2>/dev/null || true

      - name: 💾 提交报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 Cypress 报告 $(date +%Y-%m-%d_%H%M) [skip ci]"
          for i in 1 2 3; do
            git stash --include-untracked || true
            git pull --rebase origin main || true
            git stash pop || true
            git push && break
            sleep $((i * 5))
          done
