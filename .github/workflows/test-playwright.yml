# ═══════════════════════════════════════════════════════════════════
# Playwright E2E 端到端测试工作流
# 11,093 用例 | Node 18 | 5浏览器矩阵
# ═══════════════════════════════════════════════════════════════════
name: 🎭 Playwright

permissions:
  contents: write

on:
  push:
    branches: [main]
    paths:
      - 'testing/tests/playwright-tests/**'
      - '.github/workflows/test-playwright.yml'
  workflow_dispatch:
    inputs:
      test_level:
        description: '测试级别'
        required: true
        default: 'smoke'
        type: choice
        options:
          - smoke
          - standard
          - full
      project:
        description: '浏览器项目（可选）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - chromium
          - firefox
          - webkit

concurrency:
  group: playwright-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: 🎭 Playwright (${{ github.event.inputs.test_level || 'smoke' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 安装依赖
        working-directory: testing/tests/playwright-tests
        run: |
          npm ci || npm install
          npx playwright install --with-deps chromium

      - name: 🧪 运行 Playwright
        id: test
        working-directory: testing/tests/playwright-tests
        continue-on-error: true
        run: |
          LEVEL="${{ github.event.inputs.test_level || 'smoke' }}"
          PROJECT="${{ github.event.inputs.project }}"
          
          ARGS="--reporter=list,junit"
          
          if [ -n "$PROJECT" ]; then
            ARGS="$ARGS --project=$PROJECT"
          fi
          
          if [ "$LEVEL" = "smoke" ]; then
            ARGS="$ARGS --grep @smoke"
          fi
          
          export PLAYWRIGHT_JUNIT_OUTPUT_NAME=../../../TestResults/playwright-results.xml
          npx playwright test $ARGS 2>&1 | tee ../../../TestResults/playwright-output.txt || true

      - name: 📊 生成错误报告
        if: always()
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          
          cat > test-error-reports/latest/playwright-errors.md << EOF
          # 🎭 Playwright 测试错误报告
          
          - **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          - **Git Commit**: ${{ github.sha }}
          - **触发方式**: ${{ github.event_name }}
          - **测试级别**: ${{ github.event.inputs.test_level || 'smoke' }}
          
          ## 失败详情
          
          EOF
          
          if [ -f TestResults/playwright-output.txt ]; then
            echo '```' >> test-error-reports/latest/playwright-errors.md
            grep -E "✘|failed|Error|FAIL|Timeout" TestResults/playwright-output.txt | head -100 >> test-error-reports/latest/playwright-errors.md || true
            echo '```' >> test-error-reports/latest/playwright-errors.md
          fi
          
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/playwright-errors.md "test-error-reports/history/$TIMESTAMP/" || true

      - name: 📤 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-results
          path: |
            TestResults/
            test-error-reports/
          retention-days: 30

      - name: � 生成标准格式报告
        if: always()
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          ./.github/scripts/generate-ci-report.sh playwright \
            --xml TestResults/playwright-results.xml \
            --output TestResults/playwright-output.txt \
            --level "${{ github.event.inputs.test_level || 'smoke' }}"

      - name: 💾 提交报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 Playwright 报告 $(date +%Y-%m-%d_%H%M)"
          git stash --include-untracked || true
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep $((i * 5))
          done
