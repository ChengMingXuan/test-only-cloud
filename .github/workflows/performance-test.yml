name: Performance Testing

on:
  # 每天凌晨2点运行
  schedule:
    - cron: '0 2 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test Type'
        required: true
        default: 'load'
        type: choice
        options:
          - smoke
          - load
          - stress
          - spike
          - soak
      
      base_url:
        description: 'Base URL'
        required: false
        default: 'https://api.jgsy-agi.com'
  
  # PR到main分支时运行smoke test
  pull_request:
    branches:
      - main

env:
  K6_VERSION: '0.47.0'

jobs:
  performance-test:
    name: K6 Performance Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
          k6 version
      
      - name: Determine test type
        id: test-config
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "test_type=smoke" >> $GITHUB_OUTPUT
            echo "base_url=https://staging-api.jgsy-agi.com" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "test_type=${{ github.event.inputs.test_type }}" >> $GITHUB_OUTPUT
            echo "base_url=${{ github.event.inputs.base_url }}" >> $GITHUB_OUTPUT
          else
            echo "test_type=load" >> $GITHUB_OUTPUT
            echo "base_url=https://api.jgsy-agi.com" >> $GITHUB_OUTPUT
          fi
      
      - name: Run K6 Test
        env:
          BASE_URL: ${{ steps.test-config.outputs.base_url }}
        run: |
          mkdir -p results
          
          TEST_TYPE="${{ steps.test-config.outputs.test_type }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          OUTPUT_FILE="results/${TEST_TYPE}_${TIMESTAMP}.json"
          
          echo "Running $TEST_TYPE test against $BASE_URL..."
          
          k6 run \
            --env BASE_URL=$BASE_URL \
            --out json=$OUTPUT_FILE \
            testing/k6/scenarios/${TEST_TYPE}-test.js \
            || EXIT_CODE=$?
          
          echo "exit_code=${EXIT_CODE:-0}" >> $GITHUB_OUTPUT
          echo "output_file=$OUTPUT_FILE" >> $GITHUB_OUTPUT
      
      - name: Parse results
        id: parse-results
        run: |
          OUTPUT_FILE="${{ steps.run-test.outputs.output_file }}"
          
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "❌ Results file not found!"
            exit 1
          fi
          
          # 提取关键指标
          P95=$(jq -r '.metrics.http_req_duration.values["p(95)"]' $OUTPUT_FILE 2>/dev/null || echo "N/A")
          P99=$(jq -r '.metrics.http_req_duration.values["p(99)"]' $OUTPUT_FILE 2>/dev/null || echo "N/A")
          ERROR_RATE=$(jq -r '.metrics.http_req_failed.values.rate' $OUTPUT_FILE 2>/dev/null || echo "N/A")
          RPS=$(jq -r '.metrics.http_reqs.values.rate' $OUTPUT_FILE 2>/dev/null || echo "N/A")
          
          echo "p95=$P95" >> $GITHUB_OUTPUT
          echo "p99=$P99" >> $GITHUB_OUTPUT
          echo "error_rate=$ERROR_RATE" >> $GITHUB_OUTPUT
          echo "rps=$RPS" >> $GITHUB_OUTPUT
          
          echo "📊 Performance Metrics:"
          echo "  P95: $P95 ms"
          echo "  P99: $P99 ms"
          echo "  Error Rate: $ERROR_RATE"
          echo "  RPS: $RPS"
      
      - name: Check thresholds
        id: check-thresholds
        run: |
          P95=${{ steps.parse-results.outputs.p95 }}
          P99=${{ steps.parse-results.outputs.p99 }}
          ERROR_RATE=${{ steps.parse-results.outputs.error_rate }}
          
          PASS=true
          
          # P95阈值检查 (200ms)
          if (( $(echo "$P95 > 200" | bc -l) )); then
            echo "❌ P95 ($P95 ms) exceeds threshold (200ms)"
            PASS=false
          fi
          
          # P99阈值检查 (500ms)
          if (( $(echo "$P99 > 500" | bc -l) )); then
            echo "❌ P99 ($P99 ms) exceeds threshold (500ms)"
            PASS=false
          fi
          
          # 错误率阈值检查 (1%)
          if (( $(echo "$ERROR_RATE > 0.01" | bc -l) )); then
            echo "❌ Error rate ($ERROR_RATE) exceeds threshold (0.01)"
            PASS=false
          fi
          
          if [ "$PASS" = true ]; then
            echo "✅ All thresholds passed!"
          else
            echo "❌ Some thresholds failed!"
            exit 1
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: k6-results
          path: results/*.json
          retention-days: 30
      
      - name: Comment on PR
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const p95 = '${{ steps.parse-results.outputs.p95 }}';
            const p99 = '${{ steps.parse-results.outputs.p99 }}';
            const errorRate = '${{ steps.parse-results.outputs.error_rate }}';
            const rps = '${{ steps.parse-results.outputs.rps }}';
            
            const passed = '${{ steps.check-thresholds.outcome }}' === 'success';
            const status = passed ? '✅ PASSED' : '❌ FAILED';
            
            const body = `## 🚀 Performance Test Results ${status}
            
            **Test Type**: Smoke Test
            **Base URL**: ${{ steps.test-config.outputs.base_url }}
            **Timestamp**: ${new Date().toISOString()}
            
            ### 📊 Metrics
            | Metric | Value | Threshold | Status |
            |--------|-------|-----------|--------|
            | P95 Response Time | ${p95} ms | < 200ms | ${parseFloat(p95) < 200 ? '✅' : '❌'} |
            | P99 Response Time | ${p99} ms | < 500ms | ${parseFloat(p99) < 500 ? '✅' : '❌'} |
            | Error Rate | ${(parseFloat(errorRate) * 100).toFixed(2)}% | < 1% | ${parseFloat(errorRate) < 0.01 ? '✅' : '❌'} |
            | Requests/sec | ${parseFloat(rps).toFixed(0)} | - | ℹ️ |
            
            ${passed ? '🎉 All performance thresholds met!' : '⚠️ Some thresholds were not met. Please review the results.'}
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
      
      - name: Notify Slack
        if: success() && github.event_name == 'schedule'
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "${{ steps.check-thresholds.outcome == 'success' && '✅' || '❌' }} Performance Test ${{ steps.check-thresholds.outcome == 'success' && 'Passed' || 'Failed' }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*JGSY AGI Platform - Performance Test*\n\n*Status:* ${{ steps.check-thresholds.outcome == 'success' && '✅ Passed' || '❌ Failed' }}\n*Test Type:* ${{ steps.test-config.outputs.test_type }}\n*P95:* ${{ steps.parse-results.outputs.p95 }}ms\n*P99:* ${{ steps.parse-results.outputs.p99 }}ms\n*Error Rate:* ${{ steps.parse-results.outputs.error_rate }}\n*RPS:* ${{ steps.parse-results.outputs.rps }}"
                  }
                }
              ]
            }
