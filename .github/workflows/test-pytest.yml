# ═══════════════════════════════════════════════════════════════════
# pytest 自动化测试工作流
# 57,774 用例 | Python 3.11 | 100% Mock（零外部依赖）
# ═══════════════════════════════════════════════════════════════════
name: 🐍 pytest

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      test_level:
        description: '测试级别'
        required: true
        default: 'full'
        type: choice
        options:
          - smoke
          - standard
          - full
      marker:
        description: 'pytest marker 过滤（可选，如 p0, api, account）'
        required: false
        default: ''

concurrency:
  group: pytest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: 🐍 pytest (${{ github.event.inputs.test_level || 'full' }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'testing/tests/requirements.txt'

      - name: 📦 安装依赖
        run: |
          pip install --upgrade pip
          pip install -r testing/tests/requirements.txt

      - name: 🧪 运行 pytest
        id: test
        working-directory: testing/tests
        continue-on-error: true
        run: |
          LEVEL="${{ github.event.inputs.test_level || 'full' }}"
          MARKER="${{ github.event.inputs.marker }}"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          
          ARGS="--tb=short --no-header -q"
          ARGS="$ARGS --junitxml=../../TestResults/pytest-results.xml"
          
          if [ "$LEVEL" = "smoke" ]; then
            ARGS="$ARGS -m smoke --maxfail=10"
          elif [ "$LEVEL" = "standard" ]; then
            ARGS="$ARGS -m 'p0 or p1' --maxfail=50"
          fi
          
          if [ -n "$MARKER" ]; then
            ARGS="$ARGS -m $MARKER"
          fi
          
          echo "执行: pytest $ARGS"
          pytest $ARGS 2>&1 | tee ../../TestResults/pytest-output.txt
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: 📊 生成错误报告
        if: always()
        run: |
          mkdir -p test-error-reports/latest
          TIMESTAMP=$(date +%Y-%m-%d_%H%M%S)
          
          cat > test-error-reports/latest/pytest-errors.md << 'HEADER'
          # 🐍 pytest 测试错误报告
          
          HEADER
          
          echo "- **执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> test-error-reports/latest/pytest-errors.md
          echo "- **Git Commit**: ${{ github.sha }}" >> test-error-reports/latest/pytest-errors.md
          echo "- **触发方式**: ${{ github.event_name }}" >> test-error-reports/latest/pytest-errors.md
          echo "- **测试级别**: ${{ github.event.inputs.test_level || 'full' }}" >> test-error-reports/latest/pytest-errors.md
          echo "" >> test-error-reports/latest/pytest-errors.md
          
          if [ -f TestResults/pytest-results.xml ]; then
            # 解析 JUnit XML
            TOTAL=$(grep -oP 'tests="\K[0-9]+' TestResults/pytest-results.xml | head -1 || echo "0")
            FAILURES=$(grep -oP 'failures="\K[0-9]+' TestResults/pytest-results.xml | head -1 || echo "0")
            ERRORS=$(grep -oP 'errors="\K[0-9]+' TestResults/pytest-results.xml | head -1 || echo "0")
            SKIPPED=$(grep -oP 'skipped="\K[0-9]+' TestResults/pytest-results.xml | head -1 || echo "0")
            PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
            
            echo "## 统计概要" >> test-error-reports/latest/pytest-errors.md
            echo "" >> test-error-reports/latest/pytest-errors.md
            echo "| 指标 | 数值 |" >> test-error-reports/latest/pytest-errors.md
            echo "|------|------|" >> test-error-reports/latest/pytest-errors.md
            echo "| 总用例数 | $TOTAL |" >> test-error-reports/latest/pytest-errors.md
            echo "| 通过 | $PASSED |" >> test-error-reports/latest/pytest-errors.md
            echo "| 失败 | $FAILURES |" >> test-error-reports/latest/pytest-errors.md
            echo "| 错误 | $ERRORS |" >> test-error-reports/latest/pytest-errors.md
            echo "| 跳过 | $SKIPPED |" >> test-error-reports/latest/pytest-errors.md
            echo "" >> test-error-reports/latest/pytest-errors.md
          fi
          
          if [ -f TestResults/pytest-output.txt ]; then
            echo "## 失败详情" >> test-error-reports/latest/pytest-errors.md
            echo "" >> test-error-reports/latest/pytest-errors.md
            echo '```' >> test-error-reports/latest/pytest-errors.md
            grep -A 5 "FAILED\|ERROR\|AssertionError\|assert" TestResults/pytest-output.txt | head -200 >> test-error-reports/latest/pytest-errors.md || true
            echo '```' >> test-error-reports/latest/pytest-errors.md
          fi
          
          # 归档到历史
          mkdir -p "test-error-reports/history/$TIMESTAMP"
          cp test-error-reports/latest/pytest-errors.md "test-error-reports/history/$TIMESTAMP/"

      - name: 📤 上传测试结果
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: |
            TestResults/
            test-error-reports/
          retention-days: 30

      - name: � 生成标准格式报告
        if: always()
        run: |
          chmod +x .github/scripts/generate-ci-report.sh
          ./.github/scripts/generate-ci-report.sh pytest \
            --xml TestResults/pytest-results.xml \
            --output TestResults/pytest-output.txt \
            --level "${{ github.event.inputs.test_level || 'full' }}"

      - name: 💾 提交报告到仓库
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-error-reports/ || true
          git diff --cached --quiet || git commit -m "📊 pytest 报告 $(date +%Y-%m-%d_%H%M)"
          git stash --include-untracked || true
          for i in 1 2 3; do
            git pull --rebase origin main && git push && break
            sleep $((i * 5))
          done
